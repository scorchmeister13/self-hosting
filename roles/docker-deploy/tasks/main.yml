- name: Docker Deploy | Ensure folder exists
  ansible.builtin.file:
    path: /opt/stacks/{{ application_target }}/
    state: directory
    mode: '0755'

- name: 00_docker.yml
  ansible.builtin.include_tasks: "00_docker.yml"

- name: 01_traefik.yml
  ansible.builtin.include_tasks: "01_traefik.yml"
  when: application_target == "traefik"

- name: 02_immich.yml
  ansible.builtin.include_tasks: "02_immich.yml"
  when: application_target == "immich"

- name: 03_gethomepage.yml
  ansible.builtin.include_tasks: "03_gethomepage.yml"
  when: application_target == "gethomepage"

- name: 04_romm.yml
  ansible.builtin.include_tasks: "04_romm.yml"
  when: application_target == "romm"

- name: 05_gt7dashboard.yml
  ansible.builtin.include_tasks: "05_gt7dashboard.yml"
  when: application_target == "gt7dashboard"

- name: XX_docker_deploy.yml
  ansible.builtin.include_tasks: "xx_docker_deploy.yml"

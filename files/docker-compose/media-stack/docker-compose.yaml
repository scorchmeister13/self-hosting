---
services:
  gluetun:
    image: qmcgaw/gluetun:v3.41.1
    container_name: gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - BLOCK_ADS=on
      - BLOCK_MALICIOUS=on 
      - BLOCK_SURVEILLANCE=on
      - DNS_UPDATE_PERIOD=24h
      - FREE_ONLY=off
      - TZ={{ timezone }}
      - UPDATER_PERIOD=24h
      # AUTH
      - HTTP_CONTROL_SERVER_AUTH_DEFAULT_ROLE='{"auth":"apikey","apikey":"{{ gluetun_api_key }}"}'
      # WIREGUARD CONFIG
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_PORT_FORWARDING=on
      - VPN_PORT_FORWARDING_PROVIDER=protonvpn
      # - VPN_ENDPOINT_PORT=38038
      - VPN_TYPE=wireguard
      - WIREGUARD_PUBLIC_KEY={{ gluetun_wireguard_public_key }}
      - WIREGUARD_PRIVATE_KEY={{ gluetun_wireguard_private_key }}
      - WIREGUARD_ENDPOINT_IP={{ gluetun_wireguard_endpoint_ip }}
      # PORT UPDATE FOR QBITTORENT
      - VPN_PORT_FORWARDING_UP_COMMAND=/bin/sh -c 'wget -O- --retry-connrefused --post-data "json={\"listen_port\":\"{{ '{{' }}PORTS{{ '}}' }}\"}" http://127.0.0.1:8081/api/v2/app/setPreferences 2>&1'
    # ports:
    #   - 8888:8888/tcp # HTTP proxy
    #   - 8388:8388/tcp # Shadowsocks
    #   - 8388:8388/udp # Shadowsocks
    volumes:
      - ./gluetun:/gluetun
    labels:
      # Treafik
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      # Gluetun Built-in HTTP control server (API Endpoint)
      - "traefik.http.routers.gluetun.entrypoints=websecure"
      - "traefik.http.routers.gluetun.rule=Host(`gluetun.{{ domain }}`)"
      - "traefik.http.routers.gluetun.service=gluetun"
      - "traefik.http.routers.gluetun.tls=true"
      - "traefik.http.routers.gluetun.tls.certresolver=letsencrypt"
      - "traefik.http.services.gluetun.loadbalancer.server.port=8000"
      # JELLYFIN
      - "traefik.http.routers.jellyfin.entrypoints=websecure"
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.{{ domain }}`)"
      - "traefik.http.routers.jellyfin.service=jellyfin"
      - "traefik.http.routers.jellyfin.tls=true"
      - "traefik.http.routers.jellyfin.tls.certresolver=letsencrypt"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"
      # SEERR
      - "traefik.http.routers.seerr.entrypoints=websecure"
      - "traefik.http.routers.seerr.rule=Host(`media.{{ domain }}`)"
      - "traefik.http.routers.seerr.service=seerr"
      - "traefik.http.routers.seerr.tls=true"
      - "traefik.http.routers.seerr.tls.certresolver=letsencrypt"
      - "traefik.http.services.seerr.loadbalancer.server.port=5055"
      # QUI
      - "traefik.http.routers.qui.entrypoints=websecure"
      - "traefik.http.routers.qui.rule=Host(`qui.{{ domain }}`)"
      - "traefik.http.routers.qui.service=qui"
      - "traefik.http.routers.qui.tls=true"
      - "traefik.http.routers.qui.tls.certresolver=letsencrypt"
      - "traefik.http.services.qui.loadbalancer.server.port=7476"
      # QBITTORRENT
      - "traefik.http.routers.qbittorrent.entrypoints=websecure"
      - "traefik.http.routers.qbittorrent.rule=Host(`qbittorrent.{{ domain }}`)"
      - "traefik.http.routers.qbittorrent.service=qbittorrent"
      - "traefik.http.routers.qbittorrent.tls=true"
      - "traefik.http.routers.qbittorrent.tls.certresolver=letsencrypt"
      - "traefik.http.services.qbittorrent.loadbalancer.server.port=8081"
      # PROWLARR
      - "traefik.http.routers.prowlarr.entrypoints=websecure"
      - "traefik.http.routers.prowlarr.rule=Host(`prowlarr.{{ domain }}`)"
      - "traefik.http.routers.prowlarr.service=prowlarr"
      - "traefik.http.routers.prowlarr.tls=true"
      - "traefik.http.routers.prowlarr.tls.certresolver=letsencrypt"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"
      # SONARR
      - "traefik.http.routers.sonarr.entrypoints=websecure"
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.{{ domain }}`)"
      - "traefik.http.routers.sonarr.service=sonarr"
      - "traefik.http.routers.sonarr.tls=true"
      - "traefik.http.routers.sonarr.tls.certresolver=letsencrypt"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"
      # RADARR
      - "traefik.http.routers.radarr.entrypoints=websecure"
      - "traefik.http.routers.radarr.rule=Host(`radarr.{{ domain }}`)"
      - "traefik.http.routers.radarr.service=radarr"
      - "traefik.http.routers.radarr.tls=true"
      - "traefik.http.routers.radarr.tls.certresolver=letsencrypt"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"
      # LIDARR
      - "traefik.http.routers.lidarr.entrypoints=websecure"
      - "traefik.http.routers.lidarr.rule=Host(`lidarr.{{ domain }}`)"
      - "traefik.http.routers.lidarr.service=lidarr"
      - "traefik.http.routers.lidarr.tls=true"
      - "traefik.http.routers.lidarr.tls.certresolver=letsencrypt"
      - "traefik.http.services.lidarr.loadbalancer.server.port=8686"
      # DISPATCHARR
      - "traefik.http.routers.dispatcharr.entrypoints=websecure"
      - "traefik.http.routers.dispatcharr.rule=Host(`dispatcharr.{{ domain }}`)"
      - "traefik.http.routers.dispatcharr.service=dispatcharr"
      - "traefik.http.routers.dispatcharr.tls=true"
      - "traefik.http.routers.dispatcharr.tls.certresolver=letsencrypt"
      - "traefik.http.services.dispatcharr.loadbalancer.server.port=9191"
      # BAZARR
      - "traefik.http.routers.bazarr.entrypoints=websecure"
      - "traefik.http.routers.bazarr.rule=Host(`bazarr.{{ domain }}`)"
      - "traefik.http.routers.bazarr.service=bazarr"
      - "traefik.http.routers.bazarr.tls=true"
      - "traefik.http.routers.bazarr.tls.certresolver=letsencrypt"
      - "traefik.http.services.bazarr.loadbalancer.server.port=6767"
      # UNPACKERR
      - "traefik.http.routers.unpackerr.entrypoints=websecure"
      - "traefik.http.routers.unpackerr.rule=Host(`unpackerr.{{ domain }}`)"
      - "traefik.http.routers.unpackerr.service=unpackerr"
      - "traefik.http.routers.unpackerr.tls=true"
      - "traefik.http.routers.unpackerr.tls.certresolver=letsencrypt"
      - "traefik.http.services.unpackerr.loadbalancer.server.port=5656"
      # PINCHFLAT
      - "traefik.http.routers.pinch.entrypoints=websecure"
      - "traefik.http.routers.pinch.rule=Host(`youtube.{{ domain }}`)"
      - "traefik.http.routers.pinch.service=pinch"
      - "traefik.http.routers.pinch.tls=true"
      - "traefik.http.routers.pinch.tls.certresolver=letsencrypt"
      - "traefik.http.services.pinch.loadbalancer.server.port=8945"
    networks:
      - proxy

  # 🔹🔹 JELLYFIN  🔹🔹
  # Media player
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:10.11.6
    container_name: jellyfin
    network_mode: "service:gluetun"
    environment:
      - JELLYFIN_PublishedServerUrl=http://jellyfin.{{ domain }}
      - PGID=0
      - PUID=0
      - TZ={{ timezone }}
    volumes:
      - ./jellyfin/config:/config
      - ./jellyfin/cache:/cache
      - /mnt/media/disk-0/movies:/movies
      - /mnt/media/disk-0/tv:/tv
      - /mnt/media/disk-0/youtube:/youtube
      - /mnt/media/disk-0/music:/music
    devices:
      - "/dev/dri:/dev/dri"
    restart: 'unless-stopped'
    # ports:
    #   - "7359:7359/udp"  # Client Discovery

  # 🔹🔹 JELLYSEERR  🔹🔹
  # One-stop-shop for downloading movies, shows, books instead of logging in to each individual app (Sonarr, Radarr, etc)
  seerr:
    image: ghcr.io/seerr-team/seerr:v3.1.0
    network_mode: "service:gluetun"
    restart: unless-stopped
    init: true
    container_name: seerr
    environment:
      - PGID=0
      - PUID=0
      - TZ={{ timezone }}
      - NODE_EXTRA_CA_CERTS=/etc/ssl/certs/home-ca.crt
    volumes:
      - ./jellyseerr:/app/config
      - /etc/ssl/certs:/etc/ssl/certs:ro

  # 🔹🔹 QUI  🔹🔹
  # UI for Qbittorrent
  qui:
    image: ghcr.io/autobrr/qui:v1.14.1
    container_name: qui
    network_mode: "service:gluetun"
    restart: unless-stopped
    environment:
      - PGID=0
      - PUID=0
      - TZ={{ timezone }}
    volumes:
      - ./qui:/config

   # 🔹🔹 QBITTORRENT  🔹🔹
  # Torrent client
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:5.1.4
    container_name: qbittorrent
    network_mode: "service:gluetun"
    restart: unless-stopped
    environment:
      - PGID=0
      - PUID=0
      - TZ={{ timezone }}
      - WEBUI_PORT=8081
    volumes:
      - ./qbittorrent:/config
      - /mnt/media/disk-1/downloads:/downloads

  # 🔹🔹 PROWLARR  🔹🔹
  # With Prowlarr, the user gets Indexer Sync and seamless integration support with various PVR apps. In addition, with Prowlarr, the user can manage all Torrent trackers and Usenet Indexers from one place while providing support for automation with the search for and download content, irrespective of the content type.
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:2.3.0
    container_name: prowlarr
    network_mode: "service:gluetun"
    restart: unless-stopped
    environment:
      - PGID=0
      - PUID=0
      - TZ={{ timezone }}
    volumes:
      - ./prowlarr:/config

  # 🔹🔹 SONARR  🔹🔹
  # Sonarr is a PVR for Usenet and BitTorrent users. It can monitor multiple RSS feeds for new episodes of your favorite shows and will grab, sort and rename them.
  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.16
    container_name: sonarr
    network_mode: "service:gluetun"
    restart: unless-stopped
    environment:
      - PGID=0
      - PUID=0
      - TZ={{ timezone }}
    volumes:
      - ./sonarr:/config
      - /mnt/media/disk-0/tv:/tv
      - /mnt/media/disk-1/downloads:/downloads

  # 🔹🔹 RADARR  🔹🔹
  # Radarr is similar to Sonarr but grabs movies instead of TV shows.
  radarr:
    image: lscr.io/linuxserver/radarr:6.0.4
    container_name: radarr
    network_mode: "service:gluetun"
    restart: unless-stopped
    environment:
      - PGID=0
      - PUID=0
      - TZ={{ timezone }}
    volumes:
      - ./radarr:/config
      - /mnt/media/disk-0/movies:/movies
      - /mnt/media/disk-1/downloads:/downloads

  # 🔹🔹 LIDARR  🔹🔹
  # Lidarr is a music collection manager for Usenet and BitTorrent users. It can monitor multiple RSS feeds for new albums and will grab, sort and rename them.
  lidarr:
    image: lscr.io/linuxserver/lidarr:3.1.0
    container_name: lidarr
    network_mode: "service:gluetun"
    restart: unless-stopped
    environment:
      - PUID=0
      - PGID=0
      - TZ={{ timezone }}
    volumes:
      - ./lidarr:/config
      - /mnt/media/disk-0/music:/music
      - /mnt/media/disk-1/downloads:/downloads

  # 🔹🔹 DISPATCHARR  🔹🔹
  # Dispatcharr is a tool for managing IPTV streams.
  dispatcharr:
    image: ghcr.io/dispatcharr/dispatcharr:0.20.2-20260315220015
    container_name: dispatcharr
    network_mode: "service:gluetun"
    restart: unless-stopped
    volumes:
      - ./dispatcharr:/data
    environment:
      - DISPATCHARR_ENV=aio
      - REDIS_HOST=localhost
      - CELERY_BROKER_URL=redis://localhost:6379/0
      - DISPATCHARR_LOG_LEVEL=info

  # 🔹🔹 BAZARR  🔹🔹
  # Bazarr is a companion application to Sonarr and Radarr that manages and downloads subtitles based on your requirements.
  bazarr:
    image: lscr.io/linuxserver/bazarr:1.5.6
    container_name: bazarr
    network_mode: "service:gluetun"
    restart: unless-stopped
    environment:
      - UMASK_SET # Control permissions of files and directories created by Bazarr
      - PGID=0
      - PUID=0
      - TZ={{ timezone }}
    volumes:
      - ./bazarr:/config
      - /mnt/media/disk-0/tv:/tv
      - /mnt/media/disk-0/movies:/movies
      - /mnt/media/disk-1/downloads:/downloads

  # 🔹🔹 UNPACKERR  🔹🔹
  # Unpacks archives after *arr imports; integrates with Sonarr/Radarr/Lidarr/Readarr.
  # 🔗 https://github.com/davidnewhall/unpackerr
  # 🔗 https://golift.io/unpackerr
  unpackerr:
    image: golift/unpackerr:0.15
    container_name: unpackerr
    network_mode: "service:gluetun"
    environment:
      - PGID=0
      - PUID=0
      - TZ={{ timezone }}
      # General config
      - UN_DEBUG=false
      - UN_LOG_FILE=
      - UN_LOG_FILES=10
      - UN_LOG_FILE_MB=10
      - UN_INTERVAL=2m
      - UN_START_DELAY=1m
      - UN_RETRY_DELAY=5m
      - UN_MAX_RETRIES=3
      - UN_PARALLEL=4
      - UN_FILE_MODE=0644
      - UN_DIR_MODE=0755
      # Sonarr Config
      - UN_SONARR_0_URL=http://localhost:8989
      - UN_SONARR_0_API_KEY={{ sonarr_api_key }}
      - UN_SONARR_0_PATHS_0=/downloads
      - UN_SONARR_0_PROTOCOLS=torrent
      - UN_SONARR_0_TIMEOUT=10s
      - UN_SONARR_0_DELETE_ORIG=false
      - UN_SONARR_0_DELETE_DELAY=5m
      # Radarr Config
      - UN_RADARR_0_URL=http://localhost:7878
      - UN_RADARR_0_API_KEY={{ radarr_api_key }}
      - UN_RADARR_0_PATHS_0=/downloads
      - UN_RADARR_0_PROTOCOLS=torrent
      - UN_RADARR_0_TIMEOUT=10s
      - UN_RADARR_0_DELETE_ORIG=false
      - UN_RADARR_0_DELETE_DELAY=5m
      # Lidarr Config
      - UN_LIDARR_0_URL=http://localhost:8686
      - UN_LIDARR_0_API_KEY={{ lidarr_api_key }}
      - UN_LIDARR_0_PATHS_0=/downloads
      - UN_LIDARR_0_PROTOCOLS=torrent
      - UN_LIDARR_0_TIMEOUT=10s
      - UN_LIDARR_0_DELETE_ORIG=false
      - UN_LIDARR_0_DELETE_DELAY=5m
      # Web Server Config
      - UN_WEBSERVER_METRICS=false
      - UN_WEBSERVER_LISTEN_ADDR=0.0.0.0:5656
      - UN_WEBSERVER_LOG_FILE=
      - UN_WEBSERVER_LOG_FILES=10
      - UN_WEBSERVER_LOG_FILE_MB=10
      - UN_WEBSERVER_SSL_CERT_FILE=
      - UN_WEBSERVER_SSL_KEY_FILE=
      - UN_WEBSERVER_URLBASE=/
      - UN_WEBSERVER_UPSTREAMS=
    volumes:
      - /mnt/media/disk-1/downloads:/downloads

  # 🔹🔹 PINCHFLAT  🔹🔹
  # Pinchflat is for tracking/downloading youtube videos
  pinchflat:
    image: ghcr.io/kieraneglin/pinchflat:v2025.6.6
    container_name: pinchflat
    network_mode: "service:gluetun"
    restart: always
    environment:
      - PGID=0
      - PUID=0
      - TZ={{ timezone }}
    volumes:
      - ./pinchflat:/config
      - /mnt/media/disk-0/youtube:/downloads

networks:
  proxy:
    external: true

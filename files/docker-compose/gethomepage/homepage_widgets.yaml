---
# For configuration options and examples, please see:
# https://gethomepage.dev/configs/info-widgets/

# - resources:
#     cpu: true
#     memory: true
#     disk: /

- greeting:
    text_size: xl
    text: Scorch's Home Lab

- openmeteo:
    label: Urayasu
    latitude: 35.67056
    longitude: 139.88861
    timezone: Asia/Tokyo
    units: metric
    cache: 60

- search:
    provider: custom
    url: https://searxng.{{ domain }}/search?q=
    target: _blank
    showSearchSuggestions: true

- datetime:
    text_size: xl
    locale: ja-JP
    format:
      timeStyle: long
      dateStyle: long

services:
  ntfy:
    user: 1000:1000
    image: binwiederhier/ntfy:v2.18
    container_name: ntfy
    command:
      - serve
    environment:
      - TZ={{ timezone }}
      - NTFY_BASE_URL=http://ntfy.{{ domain }}
      - NTFY_BEHIND_PROXY=true
      - NTFY_LISTEN_HTTP=0.0.0.0:4002
    volumes:
      - ./ntfy:/var/cache/ntfy
      - ./ntfy:/etc/ntfy
    healthcheck:
        test: ["CMD-SHELL", "wget -q --tries=1 http://localhost:4002/v1/health -O - | grep -Eo '\"healthy\"\\s*:\\s*true' || exit 1"]
        interval: 60s
        timeout: 10s
        retries: 3
        start_period: 40s
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.ntfy.entrypoints=websecure"
      - "traefik.http.routers.ntfy.rule=Host(`ntfy.{{ domain }}`)"
      - "traefik.http.routers.ntfy.service=ntfy"
      - "traefik.http.routers.ntfy.tls=true"
      - "traefik.http.routers.ntfy.tls.certresolver=letsencrypt"
      - "traefik.http.services.ntfy.loadbalancer.server.port=4002"
    networks:
      - proxy

networks:
  proxy:
    external: true